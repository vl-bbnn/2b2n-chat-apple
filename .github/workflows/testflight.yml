name: TestFlight

on:
  workflow_dispatch:
    inputs:
      upload:
        description: Upload the exported IPA to TestFlight
        type: boolean
        default: true
      build_number:
        description: Optional CURRENT_PROJECT_VERSION override
        required: false

permissions:
  contents: read

concurrency:
  group: testflight-${{ github.ref }}
  cancel-in-progress: false

jobs:
  testflight:
    name: Build and Upload
    runs-on: macos-26
    timeout-minutes: 90

    env:
      SCHEME: ElementX
      CONFIGURATION: Release
      ARCHIVE_PATH: build/ElementX.xcarchive
      EXPORT_PATH: build/testflight-export
      EXPORT_OPTIONS_PLIST: build/ExportOptions.plist
      TESTFLIGHT_EXPORT_METHOD: ${{ vars.TESTFLIGHT_EXPORT_METHOD || 'app-store-connect' }}
      TESTFLIGHT_BUILD_NUMBER: ${{ github.event.inputs.build_number || github.run_number }}
      OVERLAY_APP_DISPLAY_NAME: ${{ vars.OVERLAY_PRODUCTION_APP_NAME }}
      OVERLAY_PRODUCTION_APP_NAME: ${{ vars.OVERLAY_PRODUCTION_APP_NAME }}
      OVERLAY_BASE_BUNDLE_IDENTIFIER: ${{ vars.OVERLAY_BASE_BUNDLE_IDENTIFIER }}
      OVERLAY_DEVELOPMENT_TEAM: ${{ vars.OVERLAY_DEVELOPMENT_TEAM }}
      OVERLAY_APS_ENVIRONMENT: ${{ vars.OVERLAY_APS_ENVIRONMENT || 'production' }}
      OVERLAY_APP_GROUP_IDENTIFIER: ${{ vars.OVERLAY_APP_GROUP_IDENTIFIER }}
      OVERLAY_CLASSIC_APP_GROUP_IDENTIFIER: ${{ vars.OVERLAY_CLASSIC_APP_GROUP_IDENTIFIER }}
      OVERLAY_CLASSIC_APP_KEYCHAIN_SERVICE_IDENTIFIER: ${{ vars.OVERLAY_CLASSIC_APP_KEYCHAIN_SERVICE_IDENTIFIER }}
      OVERLAY_CLASSIC_APP_KEYCHAIN_ACCESS_GROUP_IDENTIFIER: ${{ vars.OVERLAY_CLASSIC_APP_KEYCHAIN_ACCESS_GROUP_IDENTIFIER }}
      OVERLAY_CLASSIC_APP_DEEP_LINK_URL: ${{ vars.OVERLAY_CLASSIC_APP_DEEP_LINK_URL }}
      OVERLAY_ASSOCIATED_APPLINK_DOMAIN: ${{ vars.OVERLAY_ASSOCIATED_APPLINK_DOMAIN }}
      OVERLAY_ASSOCIATED_WEB_CREDENTIALS_DOMAIN: ${{ vars.OVERLAY_ASSOCIATED_WEB_CREDENTIALS_DOMAIN }}
      ENABLE_LOCAL_SIGNING_ASSETS: ${{ vars.ENABLE_LOCAL_SIGNING_ASSETS }}
      BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
      P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      APPLE_PROVISIONING_PROFILES_ARCHIVE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILES_ARCHIVE_BASE64 }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: true
          persist-credentials: false

      - name: Select Xcode
        run: |
          if [ -d /Applications/Xcode_26.4.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.4.app/Contents/Developer
          else
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          fi
          xcodebuild -version

      - name: Install build tools
        run: |
          unset HOMEBREW_NO_INSTALL_FROM_API
          export HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK=1
          brew update
          brew install xcodegen git-lfs pkl swiftlint swiftformat

      - name: Prepare App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
        run: |
          test -n "$APP_STORE_CONNECT_API_KEY_ID"
          test -n "$APP_STORE_CONNECT_ISSUER_ID"
          test -n "$APP_STORE_CONNECT_API_KEY_P8"
          mkdir -p "$RUNNER_TEMP/private_keys"
          key_path="$RUNNER_TEMP/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          printf '%s' "$APP_STORE_CONNECT_API_KEY_P8" > "$key_path"
          chmod 600 "$key_path"
          echo "ASC_KEY_PATH=$key_path" >> "$GITHUB_ENV"
          echo "ASC_KEY_ID=$APP_STORE_CONNECT_API_KEY_ID" >> "$GITHUB_ENV"
          echo "ASC_KEY_ISSUER_ID=$APP_STORE_CONNECT_ISSUER_ID" >> "$GITHUB_ENV"
          echo "API_PRIVATE_KEYS_DIR=$RUNNER_TEMP/private_keys" >> "$GITHUB_ENV"

      - name: Render overlay config
        run: |
          scripts/render_overlay_local_xcconfig.sh
          test -f Config/Overlay.local.xcconfig

      - name: Generate project
        run: xcodegen

      - name: Install signing assets
        if: env.ENABLE_LOCAL_SIGNING_ASSETS == 'true'
        run: scripts/install_apple_signing_assets.sh

      - name: Archive
        run: |
          mkdir -p build
          auth_args=(
            -authenticationKeyPath "$ASC_KEY_PATH"
            -authenticationKeyID "$ASC_KEY_ID"
            -authenticationKeyIssuerID "$ASC_KEY_ISSUER_ID"
          )
          args=(
            -project ElementX.xcodeproj
            -scheme "$SCHEME"
            -configuration "$CONFIGURATION"
            -destination "generic/platform=iOS"
            -archivePath "$ARCHIVE_PATH"
            -allowProvisioningUpdates
            "${auth_args[@]}"
            clean archive
            CODE_SIGN_STYLE=Automatic
            DEVELOPMENT_TEAM="$OVERLAY_DEVELOPMENT_TEAM"
            CURRENT_PROJECT_VERSION="$TESTFLIGHT_BUILD_NUMBER"
          )
          xcodebuild "${args[@]}"

      - name: Export IPA
        run: |
          scripts/write_testflight_export_options.sh "$EXPORT_OPTIONS_PLIST"
          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS_PLIST" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_KEY_ISSUER_ID"
          find "$EXPORT_PATH" -maxdepth 1 -name '*.ipa' -print

      - name: Upload IPA artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: testflight-ipa
          path: build/testflight-export/*.ipa
          retention-days: 7
          if-no-files-found: error

      - name: Upload to TestFlight
        if: ${{ github.event.inputs.upload == 'true' }}
        run: |
          test -n "$ASC_KEY_ID"
          test -n "$ASC_KEY_ISSUER_ID"
          ipa_path="$(find "$EXPORT_PATH" -maxdepth 1 -name '*.ipa' | head -n 1)"
          test -n "$ipa_path"
          xcrun altool --upload-app \
            --type ios \
            --file "$ipa_path" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_KEY_ISSUER_ID"
